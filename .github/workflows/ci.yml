name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff: syntax/errors/import issues)
        run: |
          ruff check desktop --select E9,F63,F7,F82

      - name: Compile check
        run: |
          python -m compileall desktop/alter_app

      - name: Smoke import check
        run: |
          python -c "import sys; sys.path.insert(0, 'desktop'); import alter_app; from alter_app.app import main; from alter_app.main_window import MainWindow; print('SMOKE OK')"
